<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biskit</title>
    <link rel="icon" type="image/png" th:href="@{/images/marca/icono.png}" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header th:replace="fragmentos::navbar-logged"></header>
    <main>
      <a
        th:href="@{/vet/pets}"
        class="back-link group mt-8 mb-2 ml-5 inline-flex h-10 items-center justify-start sm:ml-8 md:ml-16 lg:ml-28"
      >
        <svg class="mt-1 h-9" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
          <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
          <g id="SVGRepo_iconCarrier">
            <path
              d="M8 12L16 12"
              stroke="#6B6B6B"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
            <path
              d="M11 9L8.08704 11.913V11.913C8.03897 11.961 8.03897 12.039 8.08704 12.087V12.087L11 15"
              stroke="#6B6B6B"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </g>
        </svg>
        <h2
          class="ml-1 text-lg font-bold tracking-wider text-[#4a4a4acc] underline underline-offset-6 transition-colors duration-300 group-hover:text-[#4A4A4Aee]"
        >
          Lista de Mascotas
        </h2>
      </a>
      <section
        id="info-pet-layout"
        class="mx-5 mt-5 mb-10 grid grid-cols-1 gap-8 sm:mx-8 md:mx-30 md:grid-cols-2 lg:mx-40 lg:grid-cols-3"
      >
        <!----- Card de la Mascota ----->
        <aside
          class="card-mascota info-pet-card group rounded-2xlcard-mascota group mx-auto h-auto w-full max-w-full rounded-2xl bg-[#FBFAF8] p-3 shadow-[0_10px_30px_-6px_rgba(0,0,0,0.08)] transition-all duration-300 ease-[cubic-bezier(0.22,1,0.36,1)] hover:-translate-y-1 hover:shadow-[0_16px_40px_-8px_rgba(0,0,0,0.12)] md:max-w-xs lg:max-w-sm"
        >
          <!-- CONTENIDO -->
          <article class="h-full">
            <div th:switch="${pet.estado}" class="relative overflow-hidden rounded-2xl">
              <!-- Botón de Editar -->
              <a
                th:href="@{/vet/pets/update/{id}(id=${pet.id})}"
                onclick="event.stopPropagation()"
                class="group/editar absolute top-4 left-4 z-10 rounded-lg border border-white/30 bg-white/20 p-2 text-white shadow-sm backdrop-blur-md transition-all duration-200 hover:bg-white/30"
              >
                <svg
                  class="h-5 transition-all duration-200 group-hover/editar:scale-105"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                  <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                  <g id="SVGRepo_iconCarrier">
                    <path
                      d="M21.2799 6.40005L11.7399 15.94C10.7899 16.89 7.96987 17.33 7.33987 16.7C6.70987 16.07 7.13987 13.25 8.08987 12.3L17.6399 2.75002C17.8754 2.49308 18.1605 2.28654 18.4781 2.14284C18.7956 1.99914 19.139 1.92124 19.4875 1.9139C19.8359 1.90657 20.1823 1.96991 20.5056 2.10012C20.8289 2.23033 21.1225 2.42473 21.3686 2.67153C21.6147 2.91833 21.8083 3.21243 21.9376 3.53609C22.0669 3.85976 22.1294 4.20626 22.1211 4.55471C22.1128 4.90316 22.0339 5.24635 21.8894 5.5635C21.7448 5.88065 21.5375 6.16524 21.2799 6.40005V6.40005Z"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    ></path>
                    <path
                      d="M11 4H6C4.93913 4 3.92178 4.42142 3.17163 5.17157C2.42149 5.92172 2 6.93913 2 8V18C2 19.0609 2.42149 20.0783 3.17163 20.8284C3.92178 21.5786 4.93913 22 6 22H17C19.21 22 20 20.2 20 18V13"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    ></path>
                  </g>
                </svg>
              </a>
              <div class="relative">
                <img
                  th:src="${pet.URLFoto}"
                  th:alt="${'Foto de ' + pet.nombre}"
                  class="h-48 w-full object-cover object-center transition-transform duration-500 ease-[cubic-bezier(0.22,1,0.36,1)] group-hover:scale-[1.04] sm:h-56 md:h-65"
                />
                <label
                  onclick="event.stopPropagation()"
                  class="toggle-switch absolute bottom-3 left-1/2 z-20 flex w-fit -translate-x-1/2 cursor-pointer items-center rounded-full bg-[#FBFAF8] px-1 py-1 shadow-sm"
                >
                  <input
                    th:id="${'interruptor-' + pet.id}"
                    th:attr="data-pet-id=${pet.id}"
                    type="checkbox"
                    th:checked="${pet.estado != null and pet.estado == true}"
                    class="peer hidden"
                  />
                  <span
                    aria-hidden="true"
                    class="toggle-pill absolute top-1 bottom-1 rounded-full bg-[#EDEDED] transition-all duration-300 ease-in-out"
                  >
                  </span>
                  <span
                    class="toggle-inactive relative z-10 rounded-full px-3 py-1 text-xs font-semibold tracking-wide text-[#5F5F5F] transition-all duration-300 ease-in-out peer-checked:font-normal peer-checked:text-[#6B6B6B]"
                  >
                    Inactivo
                  </span>
                  <span
                    class="toggle-active relative z-10 rounded-full px-3 py-1 text-xs font-normal tracking-wide text-[#6B6B6B] transition-all duration-300 ease-in-out peer-checked:font-medium peer-checked:text-[#2BAB60]"
                  >
                    Activo
                  </span>
                </label>
              </div>
            </div>
            <!-- Nombre y Raza -->
            <div class="mx-2 mt-3 mb-5 flex items-center justify-between sm:mx-4">
              <h3
                class="text-lg leading-none font-bold tracking-wider text-[#4a4a4a] sm:text-xl"
                th:text="${pet.nombre}"
              ></h3>
              <p
                class="text-xs leading-none font-medium text-[#6D6155]"
                th:text="${pet.especie.nombre + ' · ' + pet.raza.nombre}"
              ></p>
            </div>
            <!-- Edad y Peso -->
            <div class="mx-2 my-3 flex items-center justify-center gap-3 sm:mx-4 sm:gap-5">
              <!-- Edad -->
              <aside class="flex flex-col items-center gap-1">
                <svg class="h-4" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                  <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                  <g id="SVGRepo_iconCarrier">
                    <path
                      d="M14 22H10C6.22876 22 4.34315 22 3.17157 20.8284C2 19.6569 2 17.7712 2 14V12C2 8.22876 2 6.34315 3.17157 5.17157C4.34315 4 6.22876 4 10 4H14C17.7712 4 19.6569 4 20.8284 5.17157C22 6.34315 22 8.22876 22 12V14C22 17.7712 22 19.6569 20.8284 20.8284C20.1752 21.4816 19.3001 21.7706 18 21.8985"
                      stroke="#2B5392"
                      stroke-width="1.5"
                      stroke-linecap="round"
                    ></path>
                    <path
                      d="M7 4V2.5"
                      stroke="#2B5392"
                      stroke-width="1.5"
                      stroke-linecap="round"
                    ></path>
                    <path
                      d="M17 4V2.5"
                      stroke="#2B5392"
                      stroke-width="1.5"
                      stroke-linecap="round"
                    ></path>
                    <path
                      d="M21.5 9H16.625H10.75M2 9H5.875"
                      stroke="#2B5392"
                      stroke-width="1.5"
                      stroke-linecap="round"
                    ></path>
                  </g>
                </svg>
                <p class="text-xs font-semibold text-[#8D8580]">EDAD</p>
                <p
                  class="text-xs font-medium text-[#282828]"
                  th:text="${pet.edad == 1} ? ${pet.edad + ' año'} : ${pet.edad + ' años'}"
                ></p>
              </aside>
              <!-- Peso -->
              <aside class="flex flex-col items-center gap-1">
                <svg
                  class="h-4"
                  viewBox="0 0 512 512"
                  id="icons"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="#000000"
                >
                  <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                  <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                  <g id="SVGRepo_iconCarrier">
                    <rect
                      x="48"
                      y="48"
                      width="416"
                      height="416"
                      rx="96"
                      fill="none"
                      stroke="#2B5392"
                      stroke-linejoin="round"
                      stroke-width="32"
                    ></rect>
                    <path
                      d="M388.94,151.56c-24.46-22.28-68.72-51.4-132.94-51.4s-108.48,29.12-132.94,51.4A34.66,34.66,0,0,0,120,199.64l33.32,39.21a26.07,26.07,0,0,0,33.6,5.21c15.92-9.83,40.91-21.64,69.1-21.64s53.18,11.81,69.1,21.64a26.07,26.07,0,0,0,33.6-5.21L392,199.64A34.66,34.66,0,0,0,388.94,151.56Z"
                      fill="none"
                      stroke="#2B5392"
                      stroke-linejoin="round"
                      stroke-width="32"
                    ></path>
                  </g>
                </svg>
                <p class="text-xs font-semibold text-[#8D8580]">PESO</p>
                <p class="text-xs font-medium text-[#282828]" th:text="${pet.peso} + ' Kg'"></p>
              </aside>
            </div>
            <hr class="mx-2 my-5 border-t border-[#6D6155] opacity-40 sm:mx-4" />
            <!-- Diagnóstico -->
            <div class="mx-2 flex flex-col items-center justify-center gap-1 sm:mx-4">
              <svg class="h-4" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                  <path
                    fill-rule="evenodd"
                    clip-rule="evenodd"
                    d="M8 3C8 4.10457 7.10457 5 6 5C5.36522 5 4.7995 4.70426 4.43312 4.24305L3.68377 4.49284C3.26354 4.63291 3.04437 4.9938 3.07687 5.34291C3.21171 6.79144 3.57308 9.0342 4.50664 10.8852C5.42593 12.7078 6.80542 14 8.99998 14C11.1945 14 12.574 12.7078 13.4933 10.8852C14.4269 9.0342 14.7883 6.79144 14.9231 5.3429C14.9556 4.9938 14.7365 4.63291 14.3162 4.49284L13.5669 4.24305C13.2005 4.70426 12.6348 5 12 5C10.8954 5 10 4.10457 10 3C10 1.89543 10.8954 1 12 1C12.8308 1 13.5433 1.50659 13.8455 2.22772L14.9487 2.59547C16.1618 2.99985 17.0416 4.16308 16.9145 5.52828C16.7719 7.06027 16.3817 9.59971 15.2791 11.7858C14.2796 13.7674 12.6201 15.5771 9.97404 15.9358C10.0144 16.4923 10.1026 17.1152 10.2753 17.7292C10.5254 18.6186 10.9354 19.4287 11.5733 20.0119C12.1909 20.5765 13.0987 20.9999 14.5001 20.9999C15.9014 20.9999 16.8093 20.5765 17.4268 20.0119C18.0648 19.4286 18.4747 18.6186 18.7249 17.7292C19.0249 16.6625 19.0693 15.5564 19.0521 14.8472C17.8598 14.4504 17 13.3256 17 12C17 10.3431 18.3432 9 20 9C21.6569 9 23 10.3431 23 12C23 13.2868 22.1899 14.3843 21.0518 14.8104C21.0711 15.6368 21.0261 16.9341 20.6502 18.2707C20.3378 19.3812 19.7791 20.5712 18.7764 21.4879C17.7533 22.4233 16.3487 22.9999 14.5001 22.9999C12.6515 22.9999 11.2468 22.4233 10.2238 21.4879C9.22107 20.5712 8.66231 19.3812 8.34997 18.2707C8.11685 17.4418 8.01127 16.6232 7.9691 15.9278C5.35608 15.5511 3.71316 13.7532 2.72091 11.7858C1.61832 9.5997 1.22808 7.06026 1.08548 5.52828C0.958397 4.16308 1.83818 2.99985 3.05131 2.59547L4.15456 2.22772C4.45669 1.50659 5.16919 1 6 1C7.10457 1 8 1.89543 8 3ZM20 13.0283C19.4321 13.0283 18.9717 12.5679 18.9717 12C18.9717 11.4321 19.4321 10.9717 20 10.9717C20.5679 10.9717 21.0283 11.4321 21.0283 12C21.0283 12.5679 20.5679 13.0283 20 13.0283Z"
                    fill="#b33333"
                  ></path>
                </g>
              </svg>
              <p class="text-xs font-semibold text-[#8D8580]">DIAGNÓSTICO</p>
              <p class="text-xs font-medium text-[#282828]" th:text="${pet.enfermedad.nombre}"></p>
            </div>
          </article>
        </aside>
        <!----- Tratamientos y Dueño ----->
        <aside class="flex flex-col gap-5 lg:col-span-2">
          <!-- Tratamientos -->
          <article
            class="info-pet-tratamientos mx-auto flex h-1/2 w-full flex-col rounded-2xl bg-[#FBFAF8] p-4 shadow-[0_10px_30px_-6px_rgba(0,0,0,0.08)] transition-all duration-300 ease-[cubic-bezier(0.22,1,0.36,1)] hover:-translate-y-1 hover:shadow-[0_16px_40px_-8px_rgba(0,0,0,0.12)]"
          >
            <!-- Titulo -->
            <div class="mx-3 mt-2 mb-6 flex w-full items-center justify-between">
              <!--Icono y titulo -->
              <div class="flex items-center gap-1">
                <svg
                  class="h-6 w-auto shrink-0 sm:h-8"
                  fill="#2B5392"
                  version="1.1"
                  id="Layer_1"
                  xmlns="http://www.w3.org/2000/svg"
                  xmlns:xlink="http://www.w3.org/1999/xlink"
                  viewBox="0 0 512 512"
                  xml:space="preserve"
                  stroke="#2B5392"
                >
                  <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                  <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                  <g id="SVGRepo_iconCarrier">
                    <g>
                      <g>
                        <path
                          d="M384,221.091h-62.836l-27.927-62.836c-2.327-4.655-5.818-6.982-10.473-6.982c-4.655,0-9.309,2.327-10.473,6.982 l-51.2,116.364l-22.109-46.545c-2.327-3.491-5.818-6.982-10.473-6.982H128c-6.982,0-11.636,4.655-11.636,11.636 s4.655,11.636,11.636,11.636h52.364l30.255,62.836c2.327,3.491,5.818,6.982,10.473,6.982s8.145-2.327,10.473-6.982l51.2-115.2 l20.945,46.545c1.164,3.491,5.818,5.818,10.473,5.818H384c6.982,0,11.636-4.655,11.636-11.636S390.982,221.091,384,221.091z"
                        ></path>
                      </g>
                    </g>
                    <g>
                      <g>
                        <path
                          d="M407.273,34.909h-69.818c0-6.982-4.655-11.636-11.636-11.636h-29.091c-4.655,0-8.145-2.327-9.309-4.655 C280.436,6.982,268.8,0,256,0s-24.436,6.982-30.255,18.618c-2.327,2.327-5.818,4.655-10.473,4.655h-29.091 c-6.982,0-11.636,4.655-11.636,11.636v58.182c0,6.982,4.655,11.636,11.636,11.636h139.636c6.982,0,11.636-4.655,11.636-11.636 c0-6.982-4.655-11.636-11.636-11.636h-128V46.545h17.455c12.8,0,24.436-6.982,30.255-17.455c4.655-8.145,16.291-6.982,20.945,0 c5.818,10.473,17.455,17.455,30.255,17.455h17.455c0,6.982,4.655,11.636,11.636,11.636h81.455c6.982,0,11.636,4.655,11.636,11.636 v407.273c0,6.982-4.655,11.636-11.636,11.636H104.727c-6.982,0-11.636-4.655-11.636-11.636V69.818 c0-6.982,4.655-11.636,11.636-11.636H128c6.982,0,11.636-4.655,11.636-11.636S134.982,34.909,128,34.909h-23.273 c-19.782,0-34.909,15.127-34.909,34.909v407.273c0,19.782,15.127,34.909,34.909,34.909h302.545 c19.782,0,34.909-15.127,34.909-34.909V69.818C442.182,50.036,427.055,34.909,407.273,34.909z"
                        ></path>
                      </g>
                    </g>
                    <g>
                      <g>
                        <path
                          d="M279.273,372.364H128c-6.982,0-11.636,4.655-11.636,11.636s4.655,11.636,11.636,11.636h151.273 c6.982,0,11.636-4.655,11.636-11.636S286.255,372.364,279.273,372.364z"
                        ></path>
                      </g>
                    </g>
                    <g>
                      <g>
                        <path
                          d="M209.455,418.909H128c-6.982,0-11.636,4.655-11.636,11.636s4.655,11.636,11.636,11.636h81.455 c6.982,0,11.636-4.655,11.636-11.636S216.436,418.909,209.455,418.909z"
                        ></path>
                      </g>
                    </g>
                  </g>
                </svg>

                <h3
                  class="ml-2 text-lg leading-none font-black tracking-wider text-[#4a4a4a] sm:text-xl md:text-2xl"
                  th:text="${'Tratamientos de ' + pet.nombre}"
                ></h3>
              </div>

              <!-- Derecha: botón -->
              <a
                th:href="@{/vet/pets/tratamiento/add(id=${pet.id})}"
                class="mr-6 flex items-center gap-2 rounded-lg border border-[#2B5392] bg-transparent px-3 py-2 text-[#2B5392] transition-colors duration-200 hover:bg-[#2B5392] hover:text-[#FBFAF8]"
              >
                <svg
                  class="h-6 w-auto"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                  <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                  <g id="SVGRepo_iconCarrier">
                    <g id="Edit / Add_Plus">
                      <path
                        id="Vector"
                        d="M6 12H12M12 12H18M12 12V18M12 12V6"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      ></path>
                    </g>
                  </g>
                </svg>
                Agregar Tratamiento
              </a>
            </div>
            <!-- Tratamientos -->
            <div
              class="custom-scroll grid grid-cols-1 justify-center overflow-auto sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-2"
            >
              <a
                th:each="t : ${pet.tratamientos}"
                th:href="@{/vet/pets/tratamiento/{id}(id=${t.id})}"
                class="mx-5 mb-5 flex gap-2 rounded-lg p-2 transition hover:bg-blue-50"
              >
                <div class="w-0.5 bg-[#2B5392]"></div>

                <div class="flex flex-col gap-1">
                  <!-- Fecha del tratamiento -->
                  <p
                    class="text-xs font-semibold text-[#8D8580]"
                    th:text="${#temporals.format(t.fecha,'dd-MM-yyyy')}"
                  ></p>

                  <!-- Drogas del tratamiento -->
                  <p
                    class="text-xs font-medium text-[#282828]"
                    th:each="d : ${t.drogas}"
                    th:text="${d.nombre}"
                  ></p>
                </div>
              </a>
            </div>
          </article>
          <!-- Dueño -->
          <article
            class="info-pet-dueno mx-auto flex h-1/2 w-full flex-col items-center rounded-2xl bg-[#FBFAF8] p-3 shadow-[0_10px_30px_-6px_rgba(0,0,0,0.08)] transition-all duration-300 ease-[cubic-bezier(0.22,1,0.36,1)] hover:-translate-y-1 hover:shadow-[0_16px_40px_-8px_rgba(0,0,0,0.12)]"
          >
            <!-- Titulo -->
            <div class="mt-2 flex w-full items-center justify-start gap-1 px-5">
              <svg
                class="h-7 w-auto"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                  <circle cx="12" cy="6" r="4" stroke="#2B5392" stroke-width="1.5"></circle>
                  <path
                    d="M19.9975 18C20 17.8358 20 17.669 20 17.5C20 15.0147 16.4183 13 12 13C7.58172 13 4 15.0147 4 17.5C4 19.9853 4 22 12 22C14.231 22 15.8398 21.8433 17 21.5634"
                    stroke="#2B5392"
                    stroke-width="1.5"
                    stroke-linecap="round"
                  ></path>
                </g>
              </svg>
              <h3 class="ml-2 text-xl leading-none font-black tracking-wider text-[#4a4a4a]">
                Información del Dueño
              </h3>
            </div>
            <!-- Info del Dueño -->
            <div class="flex w-full flex-1 flex-col justify-center gap-3 px-3">
              <!-- Nombre -->
              <div class="flex w-full items-center gap-2">
