<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biskit</title>
    <link rel="icon" type="image/png" th:href="@{/images/marca/icono.png}" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet" />
  </head>
  <body>
    <header th:replace="fragmentos :: navbar-logged"></header>
    <main
      class="flex flex-col gap-8 mx-4 mb-10 sm:mx-8 md:mx-12 lg:mx-20 xl:mx-60 mt-2">
      <!-- Info del cliente -->
      <section
        class="flex flex-col justify-center gap-6 sm:gap-8 md:gap-12 h-auto px-4 sm:px-6 md:px-8 py-8 sm:py-10 md:py-15 my-3 bg-[#FBFAF8] rounded-2xl shadow-[0_10px_30px_-6px_rgba(0,0,0,0.08)] hover:shadow-[0_16px_40px_-8px_rgba(0,0,0,0.12)] hover:-translate-y-1 transition-all duration-300 ease-[cubic-bezier(0.22,1,0.36,1)]">
        <!-- Parte superior -->
        <article
          class="flex flex-col sm:flex-row mx-4 sm:mx-8 md:mx-15 justify-center gap-4 sm:gap-6">
          <!-- Nombre -->
          <div class="flex flex-col text-center gap-1">
            <h1
              th:text="${'Hola, ' + client.nombre}"
              class="text-2xl sm:text-3xl md:text-4xl font-semibold text-[#4a4a4a]"></h1>
            <p class="text-[#8d8580dd] font-medium text-sm sm:text-base">
              Aquí puedes ver tu información personal
            </p>
          </div>
        </article>
        <!-- Parte Inferior -->
        <article
          class="flex flex-col sm:flex-row justify-evenly gap-4 sm:gap-6 md:gap-12 lg:gap-20 xl:gap-32 mx-4 sm:mx-8 md:mx-15">
          <!-- Cédula -->
          <div class="flex gap-3 items-center w-full sm:w-auto">
            <div
              class="flex h-12 w-12 sm:h-14 sm:w-14 md:h-16 md:w-16 bg-[#F2F7FF] rounded-xl items-center justify-center shrink-0">
              <svg
                class="h-7 w-auto sm:h-8 md:h-10"
                viewBox="0 -0.5 25 25"
                fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g
                  id="SVGRepo_tracerCarrier"
                  stroke-linecap="round"
                  stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                  <path
                    fill-rule="evenodd"
                    clip-rule="evenodd"
                    d="M3.5 7V17C3.5 18.1046 4.39543 19 5.5 19H19.5C20.6046 19 21.5 18.1046 21.5 17V7C21.5 5.89543 20.6046 5 19.5 5H5.5C4.39543 5 3.5 5.89543 3.5 7Z"
                    stroke="#2B5392"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"></path>
                  <path
                    d="M15.5 10H18.5"
                    stroke="#2B5392"
                    stroke-width="1.5"
                    stroke-linecap="round"></path>
                  <path
                    d="M15.5 13H18.5"
                    stroke="#2B5392"
                    stroke-width="1.5"
                    stroke-linecap="round"></path>
                  <path
                    fill-rule="evenodd"
                    clip-rule="evenodd"
                    d="M11.5 10C11.5 11.1046 10.6046 12 9.5 12C8.39543 12 7.5 11.1046 7.5 10C7.5 8.89543 8.39543 8 9.5 8C10.0304 8 10.5391 8.21071 10.9142 8.58579C11.2893 8.96086 11.5 9.46957 11.5 10Z"
                    stroke="#2B5392"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"></path>
                  <path
                    d="M5.5 16C8.283 12.863 11.552 13.849 13.5 16"
                    stroke="#2B5392"
                    stroke-width="1.5"
                    stroke-linecap="round"></path>
                </g>
              </svg>
            </div>
            <div class="flex flex-col min-w-0">
              <p class="text-xs sm:text-sm text-[#8D8580] font-medium">
                Cédula
              </p>
              <p
                th:text="${client.cedula}"
                class="text-sm sm:text-base text-[#4A4A4A] font-semibold wrap-break-wordword"></p>
            </div>
          </div>
          <!-- Teléfono -->
          <div class="flex gap-3 items-center w-full sm:w-auto">
            <div
              class="flex h-12 w-12 sm:h-14 sm:w-14 md:h-16 md:w-16 bg-[#F2F7FF] rounded-xl items-center justify-center shrink-0">
              <svg
                class="h-7 w-auto sm:h-8 md:h-10"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g
                  id="SVGRepo_tracerCarrier"
                  stroke-linecap="round"
                  stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                  <path
                    d="M16.1007 13.359L15.5719 12.8272H15.5719L16.1007 13.359ZM16.5562 12.9062L17.085 13.438H17.085L16.5562 12.9062ZM18.9728 12.5894L18.6146 13.2483L18.9728 12.5894ZM20.8833 13.628L20.5251 14.2869L20.8833 13.628ZM21.4217 16.883L21.9505 17.4148L21.4217 16.883ZM20.0011 18.2954L19.4723 17.7636L20.0011 18.2954ZM18.6763 18.9651L18.7459 19.7119H18.7459L18.6763 18.9651ZM8.81536 14.7266L9.34418 14.1947L8.81536 14.7266ZM4.00289 5.74561L3.2541 5.78816L3.2541 5.78816L4.00289 5.74561ZM10.4775 7.19738L11.0063 7.72922H11.0063L10.4775 7.19738ZM10.6342 4.54348L11.2346 4.09401L10.6342 4.54348ZM9.37326 2.85908L8.77286 3.30855V3.30855L9.37326 2.85908ZM6.26145 2.57483L6.79027 3.10667H6.79027L6.26145 2.57483ZM4.69185 4.13552L4.16303 3.60368H4.16303L4.69185 4.13552ZM12.0631 11.4972L12.5919 10.9654L12.0631 11.4972ZM16.6295 13.8909L17.085 13.438L16.0273 12.3743L15.5719 12.8272L16.6295 13.8909ZM18.6146 13.2483L20.5251 14.2869L21.2415 12.9691L19.331 11.9305L18.6146 13.2483ZM20.8929 16.3511L19.4723 17.7636L20.5299 18.8273L21.9505 17.4148L20.8929 16.3511ZM18.6067 18.2184C17.1568 18.3535 13.4056 18.2331 9.34418 14.1947L8.28654 15.2584C12.7186 19.6653 16.9369 19.8805 18.7459 19.7119L18.6067 18.2184ZM9.34418 14.1947C5.4728 10.3453 4.83151 7.10765 4.75168 5.70305L3.2541 5.78816C3.35456 7.55599 4.14863 11.144 8.28654 15.2584L9.34418 14.1947ZM10.7195 8.01441L11.0063 7.72922L9.9487 6.66555L9.66189 6.95073L10.7195 8.01441ZM11.2346 4.09401L9.97365 2.40961L8.77286 3.30855L10.0338 4.99296L11.2346 4.09401ZM5.73263 2.04299L4.16303 3.60368L5.22067 4.66736L6.79027 3.10667L5.73263 2.04299ZM10.1907 7.48257C9.66189 6.95073 9.66117 6.95144 9.66045 6.95216C9.66021 6.9524 9.65949 6.95313 9.659 6.95362C9.65802 6.95461 9.65702 6.95561 9.65601 6.95664C9.65398 6.95871 9.65188 6.96086 9.64972 6.9631C9.64539 6.96759 9.64081 6.97245 9.63599 6.97769C9.62634 6.98816 9.61575 7.00014 9.60441 7.01367C9.58174 7.04072 9.55605 7.07403 9.52905 7.11388C9.47492 7.19377 9.41594 7.2994 9.36589 7.43224C9.26376 7.70329 9.20901 8.0606 9.27765 8.50305C9.41189 9.36833 10.0078 10.5113 11.5343 12.0291L12.5919 10.9654C11.1634 9.54499 10.8231 8.68059 10.7599 8.27309C10.7298 8.07916 10.761 7.98371 10.7696 7.96111C10.7748 7.94713 10.7773 7.9457 10.7709 7.95525C10.7677 7.95992 10.7624 7.96723 10.7541 7.97708C10.75 7.98201 10.7451 7.98759 10.7394 7.99381C10.7365 7.99692 10.7335 8.00019 10.7301 8.00362C10.7285 8.00534 10.7268 8.00709 10.725 8.00889C10.7241 8.00979 10.7232 8.0107 10.7223 8.01162C10.7219 8.01208 10.7212 8.01278 10.7209 8.01301C10.7202 8.01371 10.7195 8.01441 10.1907 7.48257ZM11.5343 12.0291C13.0613 13.5474 14.2096 14.1383 15.0763 14.2713C15.5192 14.3392 15.8763 14.285 16.1472 14.1841C16.28 14.1346 16.3858 14.0763 16.4658 14.0227C16.5058 13.9959 16.5392 13.9704 16.5663 13.9479C16.5799 13.9367 16.5919 13.9262 16.6024 13.9166C16.6077 13.9118 16.6126 13.9073 16.6171 13.903C16.6194 13.9008 16.6215 13.8987 16.6236 13.8967C16.6246 13.8957 16.6256 13.8947 16.6266 13.8937C16.6271 13.8932 16.6279 13.8925 16.6281 13.8923C16.6288 13.8916 16.6295 13.8909 16.1007 13.359C15.5719 12.8272 15.5726 12.8265 15.5733 12.8258C15.5735 12.8256 15.5742 12.8249 15.5747 12.8244C15.5756 12.8235 15.5765 12.8226 15.5774 12.8217C15.5793 12.82 15.581 12.8183 15.5827 12.8166C15.5862 12.8133 15.5895 12.8103 15.5926 12.8074C15.5988 12.8018 15.6044 12.7969 15.6094 12.7929C15.6192 12.7847 15.6265 12.7795 15.631 12.7764C15.6403 12.7702 15.6384 12.773 15.6236 12.7785C15.5991 12.7876 15.501 12.8189 15.3038 12.7886C14.8905 12.7253 14.02 12.3853 12.5919 10.9654L11.5343 12.0291ZM9.97365 2.40961C8.95434 1.04802 6.94996 0.83257 5.73263 2.04299L6.79027 3.10667C7.32195 2.578 8.26623 2.63181 8.77286 3.30855L9.97365 2.40961ZM4.75168 5.70305C4.73201 5.35694 4.89075 4.9954 5.22067 4.66736L4.16303 3.60368C3.62571 4.13795 3.20329 4.89425 3.2541 5.78816L4.75168 5.70305ZM19.4723 17.7636C19.1975 18.0369 18.9029 18.1908 18.6067 18.2184L18.7459 19.7119C19.4805 19.6434 20.0824 19.2723 20.5299 18.8273L19.4723 17.7636ZM11.0063 7.72922C11.9908 6.7503 12.064 5.2019 11.2346 4.09401L10.0338 4.99295C10.4373 5.53193 10.3773 6.23938 9.9487 6.66555L11.0063 7.72922ZM20.5251 14.2869C21.3429 14.7315 21.4703 15.7769 20.8929 16.3511L21.9505 17.4148C23.2908 16.0821 22.8775 13.8584 21.2415 12.9691L20.5251 14.2869ZM17.085 13.438C17.469 13.0562 18.0871 12.9616 18.6146 13.2483L19.331 11.9305C18.2474 11.3414 16.9026 11.5041 16.0273 12.3743L17.085 13.438Z"
                    fill="#2B5392"></path>
                </g>
              </svg>
            </div>
            <div class="flex flex-col min-w-0">
              <p class="text-xs sm:text-sm text-[#8D8580] font-medium">
                Teléfono
              </p>
              <p
                th:text="${client.celular}"
                class="text-sm sm:text-base text-[#4A4A4A] font-semibold wrap-break-word"></p>
            </div>
          </div>
          <!-- Correo -->
          <div class="flex gap-3 items-center w-full sm:w-auto">
            <div
              class="flex h-12 w-12 sm:h-14 sm:w-14 md:h-16 md:w-16 bg-[#F2F7FF] rounded-xl items-center justify-center shrink-0">
              <svg
                class="h-7 w-auto sm:h-8 md:h-10"
                viewBox="0 0 32 32"
                xmlns="http://www.w3.org/2000/svg"
                fill="none">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g
                  id="SVGRepo_tracerCarrier"
                  stroke-linecap="round"
                  stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                  <path
                    stroke="#2b5392"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M3 9a2 2 0 012-2h22a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                  <path
                    stroke="#2b5392"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M3 9l11.862 8.212a2 2 0 002.276 0L29 9"></path>
                </g>
              </svg>
            </div>
            <div class="flex flex-col min-w-0 flex-1">
              <p class="text-xs sm:text-sm text-[#8D8580] font-medium">
                Correo
              </p>
              <p
                th:text="${client.correo}"
                class="text-sm sm:text-base text-[#4A4A4A] font-semibold break-all"></p>
            </div>
          </div>
        </article>
      </section>
      <!-- Mascotas -->
      <section class="flex flex-col items-center gap-6">
        <article class="text-[#4a4a4a] text-center">
          <h1
            class="text-[#4a4a4a] text-2xl sm:text-3xl md:text-4xl font-semibold tracking-wider">
            Tus Mascotas
          </h1>
          <p class="text-[#8d8580dd] font-medium text-sm sm:text-base">
            Aquí puedes ver toda la información de tus mascotas y sus
            tratamientos
          </p>
        </article>
        <article
          th:if="${pets == null or pets.isEmpty()}"
          class="mx-2 sm:mx-10 my-20 text-center">
          <p class="text-[#8d8580dd] text-base">
            No hay mascotas registradas en el sistema
          </p>
        </article>
        <!-- Grid de mascotas (solo si existen) -->
        <article
          th:if="${pets != null and !pets.isEmpty()}"
          class="grid grid-cols-1 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 sm:mx-10 mb-10 gap-6 sm:gap-8 lg:gap-10">
          <!-- Card -->
          <a
            th:href="@{/client/{idClient}/pets/{idPet}(idClient=${client.id},idPet=${pet.id})}"
            th:each="pet : ${pets}"
            th:attr="data-nombre=${pet.nombre}"
            class="card-mascota group cursor-pointer h-auto w-full max-w-xs mx-auto p-3 bg-[#FBFAF8] rounded-2xl shadow-[0_10px_30px_-6px_rgba(0,0,0,0.08)] hover:shadow-[0_16px_40px_-8px_rgba(0,0,0,0.12)] hover:-translate-y-1 transition-all duration-300 ease-[cubic-bezier(0.22,1,0.36,1)]">
            <!-- CONTENIDO -->
            <article class="h-full">
              <div class="overflow-hidden rounded-2xl space-y-3">
                <div class="relative rounded-2xl overflow-hidden">
                  <img
                    th:src="${pet.URLFoto}"
                    th:alt="${'Foto de ' + pet.nombre}"
                    class="block h-48 sm:h-56 md:h-65 w-full rounded-2xl object-cover object-center transition-transform duration-500 ease-[cubic-bezier(0.22,1,0.36,1)] group-hover:scale-[1.04]" />
                  <span
                    th:if="${pet.estado != null and pet.estado.name() == 'ACTIVO'}"
                    th:text="${pet.estado.texto}"
                    class="px-3 py-1 rounded-md text-[#2BAB60] bg-[#E1F8EA] absolute top-2 right-2 font-medium"></span>
                  <span
                    th:if="${pet.estado != null and pet.estado.name() == 'INACTIVO'}"
                    th:text="${pet.estado.texto}"
                    class="px-3 py-1 rounded-md text-[#6B6B6B] bg-[#EDEDED] absolute top-2 right-2 font-medium"></span>
                </div>
                <!-- Nombre y Raza -->
                <div
                  class="flex justify-between items-center mx-2 sm:mx-4 mt-3">
                  <h3
                    class="text-[#4a4a4a] font-bold text-lg sm:text-xl leading-none tracking-wider"
                    th:text="${pet.nombre}"></h3>
                  <p
                    class="text-[#6D6155] font-medium text-xs leading-none"
                    th:text="${pet.especie.getTexto() + ' · ' + pet.raza}"></p>
                </div>
                <!-- Edad y Peso -->
                <div
                  class="flex justify-center items-center mx-2 sm:mx-4 my-3 gap-10">
                  <!-- EDAD -->
                  <aside class="flex flex-col items-center w-auto">
                    <div class="flex flex-col items-center gap-1">
                      <svg
                        class="h-4"
                        viewBox="0 0 24 24"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                        <g
                          id="SVGRepo_tracerCarrier"
                          stroke-linecap="round"
                          stroke-linejoin="round"></g>
                        <g id="SVGRepo_iconCarrier">
                          <path
                            d="M14 22H10C6.22876 22 4.34315 22 3.17157 20.8284C2 19.6569 2 17.7712 2 14V12C2 8.22876 2 6.34315 3.17157 5.17157C4.34315 4 6.22876 4 10 4H14C17.7712 4 19.6569 4 20.8284 5.17157C22 6.34315 22 8.22876 22 12V14C22 17.7712 22 19.6569 20.8284 20.8284C20.1752 21.4816 19.3001 21.7706 18 21.8985"
                            stroke="#2B5392"
                            stroke-width="1.5"
                            stroke-linecap="round"></path>
                          <path
                            d="M7 4V2.5"
                            stroke="#2B5392"
                            stroke-width="1.5"
                            stroke-linecap="round"></path>
                          <path
                            d="M17 4V2.5"
                            stroke="#2B5392"
                            stroke-width="1.5"
                            stroke-linecap="round"></path>
                          <path
                            d="M21.5 9H16.625H10.75M2 9H5.875"
                            stroke="#2B5392"
                            stroke-width="1.5"
                            stroke-linecap="round"></path>
                        </g>
                      </svg>
                      <p class="text-xs text-[#8D8580] font-semibold">EDAD</p>
                    </div>
                    <div class="flex flex-1 items-center">
                      <p
                        class="text-xs text-[#282828] font-medium"
                        th:text="${pet.edad == 1} ? ${pet.edad + ' año'} : ${pet.edad + ' años'}"></p>
                    </div>
                  </aside>
                  <!-- PESO -->
                  <aside class="flex flex-col items-center w-auto">
                    <div class="flex flex-col items-center gap-1">
                      <svg
                        class="h-4"
                        viewBox="0 0 512 512"
                        id="icons"
                        xmlns="http://www.w3.org/2000/svg"
                        fill="#000000">
                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                        <g
                          id="SVGRepo_tracerCarrier"
                          stroke-linecap="round"
                          stroke-linejoin="round"></g>
                        <g id="SVGRepo_iconCarrier">
                          <rect
                            x="48"
                            y="48"
                            width="416"
                            height="416"
                            rx="96"
                            fill="none"
                            stroke="#2B5392"
                            stroke-linejoin="round"
                            stroke-width="32"></rect>
                          <path
                            d="M388.94,151.56c-24.46-22.28-68.72-51.4-132.94-51.4s-108.48,29.12-132.94,51.4A34.66,34.66,0,0,0,120,199.64l33.32,39.21a26.07,26.07,0,0,0,33.6,5.21c15.92-9.83,40.91-21.64,69.1-21.64s53.18,11.81,69.1,21.64a26.07,26.07,0,0,0,33.6-5.21L392,199.64A34.66,34.66,0,0,0,388.94,151.56Z"
                            fill="none"
                            stroke="#2B5392"
                            stroke-linejoin="round"
                            stroke-width="32"></path>
                        </g>
                      </svg>
                      <p class="text-xs text-[#8D8580] font-semibold">PESO</p>
                    </div>
                    <div class="flex flex-1 items-center">
                      <p
                        class="text-xs text-[#282828] font-medium"
                        th:text="${pet.peso} + ' Kg'"></p>
                    </div>
                  </aside>
                </div>
                <hr
                  class="border-[#6D6155] opacity-40 border-t my-2 mx-2 sm:mx-4" />
                <!-- Diagnóstico -->
                <div
                  class="flex flex-col justify-center items-center mx-2 sm:mx-4 gap-1">
                  <svg
                    class="h-4"
                    viewBox="0 0 24 24"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                    <g
                      id="SVGRepo_tracerCarrier"
                      stroke-linecap="round"
                      stroke-linejoin="round"></g>
                    <g id="SVGRepo_iconCarrier">
                      <path
