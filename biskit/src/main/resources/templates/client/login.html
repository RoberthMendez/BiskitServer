<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biskit</title>

    <link rel="icon" type="image/png" th:href="@{/images/marca/icono.png}" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Playfair+Display:wght@400..900&display=swap"
      rel="stylesheet" />

    <style>
      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus {
        -webkit-text-fill-color: #111827;
        transition: background-color 9999s ease-in-out 0s;
      }
    </style>
  </head>

  <body class="min-h-screen font-[Inter,sans-serif] bg-white">
    <!-- Pantalla completa -->
    <main class="w-screen h-screen">
      <section class="w-full h-full grid grid-cols-1 lg:grid-cols-2">
        <!-- IZQUIERDA -->
        <div class="relative w-full h-full">
          <!-- botón volver (arriba) -->
          <div class="absolute top-6 left-12 z-10">
            <a
              th:if="${isClient == null or !isClient}"
              th:href="@{/}"
              class="back-link group inline-flex justify-start items-center h-10 mt-6 sm:mt-8 mb-2">
              <svg
                class="h-9 mt-1"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g
                  id="SVGRepo_tracerCarrier"
                  stroke-linecap="round"
                  stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                  <path
                    d="M8 12L16 12"
                    stroke="#6B6B6B"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"></path>
                  <path
                    d="M11 9L8.08704 11.913V11.913C8.03897 11.961 8.03897 12.039 8.08704 12.087V12.087L11 15"
                    stroke="#6B6B6B"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"></path>
                </g>
              </svg>
              <h2
                class="underline underline-offset-6 font-bold tracking-wider text-base sm:text-lg text-[#4a4a4acc] group-hover:text-[#4A4A4Aee] transition-colors duration-300">
                Volver a la Página Principal
              </h2>
            </a>
          </div>
          <div class="h-full flex items-center">
            <div class="w-full px-8 sm:px-14 lg:px-16 xl:px-20">
              <h1
                class="text-[38px] sm:text-[44px] leading-[1.1] font-semibold text-[#4a4a4a]">
                Bienvenido a Biskit
              </h1>
              <p
                class="mt-4 text-[15px] text-[#8d8580dd] font-semibold max-w-md">
                Inicia sesión para ver el historial y seguimiento de tus
                mascotas en nuestra veterinaria.
              </p>
              <form
                class="mt-8 space-y-9 max-w-md"
                th:action="@{/client/login}"
                method="post"
                autocomplete="on">
                <div class="relative">
                  <input
                    id="usuario"
                    name="usuario"
                    type="text"
                    required
                    placeholder=" "
                    class="peer w-full bg-transparent border-0 border-b border-gray-300 focus:border-gray-800 focus:ring-0 px-0 pt-6 pb-2 text-gray-900 outline-none" />
                  <label
                    for="usuario"
                    class="absolute left-0 top-2 text-sm text-gray-500 transition-all peer-placeholder-shown:top-6 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-2 peer-focus:text-sm peer-focus:text-gray-600">
                    Usuario
                  </label>
                </div>

                <div class="relative">
                  <input
                    id="contrasena"
                    name="contrasena"
                    type="password"
                    required
                    placeholder=" "
                    class="peer w-full bg-transparent border-0 border-b border-gray-300 focus:border-gray-800 focus:ring-0 px-0 pt-6 pb-2 text-gray-900 outline-none" />
                  <label
                    for="contrasena"
                    class="absolute left-0 top-2 text-sm text-gray-500 transition-all peer-placeholder-shown:top-6 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-2 peer-focus:text-sm peer-focus:text-gray-600">
                    Contraseña
                  </label>
                </div>
                <div class="pt-2">
                  <button
                    type="submit"
                    class="cursor-pointer w-44 h-12 rounded-full bg-[#2b5392] text-white font-medium shadow-[0_10px_25px_rgba(120,169,215,0.35)] transition-all duration-300 hover:bg-[#1a3a6b]">
                    Ingresar
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
        <!-- DERECHA: IMAGEN (pantalla completa) -->
        <div class="relative hidden lg:block w-full h-full">
          <img
            th:src="@{/images/cliente/loginclientebiskit.png}"
            alt="Login Cliente"
            class="absolute inset-0 w-full h-full object-cover object-center" />
        </div>
      </section>
    </main>
  </body>
</html>
