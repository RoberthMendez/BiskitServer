<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biskit</title>

    <link rel="icon" type="image/png" th:href="@{/images/marca/icono.png}" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Playfair+Display:wght@400..900&display=swap"
      rel="stylesheet"
    />

    <style>
      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus {
        -webkit-text-fill-color: #111827;
        transition: background-color 9999s ease-in-out 0s;
      }
    </style>
  </head>

  <body class="min-h-screen bg-white font-[Inter,sans-serif]">
    <!-- Pantalla completa -->
    <main class="h-screen w-screen">
      <section class="grid h-full w-full grid-cols-1 lg:grid-cols-2">
        <!-- IZQUIERDA -->
        <div class="relative flex h-full w-full flex-col justify-center">
          <!-- botón volver (arriba) -->
          <div class="mt-6 flex px-10 sm:px-18 lg:px-26">
            <div class="w-full">
              <h1 class="text-[38px] leading-[1.1] font-semibold text-[#4a4a4a] sm:text-[44px]">
                Bienvenido a Biskit
              </h1>
              <p class="mt-4 max-w-md text-[15px] font-semibold text-[#8d8580dd]">
                Inicia sesión para ver el historial y seguimiento de tus mascotas en nuestra
                veterinaria.
              </p>
              <form
                class="relative mt-6 max-w-md space-y-9"
                th:action="@{/client/login}"
                method="post"
                autocomplete="on"
              >
                <div class="relative">
                  <input
                    id="usuario"
                    name="usuario"
                    type="text"
                    required
                    placeholder=" "
                    class="peer w-full border-0 border-b border-gray-300 bg-transparent px-0 pt-6 pb-2 text-gray-900 outline-none focus:border-gray-800 focus:ring-0"
                  />
                  <label
                    for="usuario"
                    class="absolute top-2 left-0 cursor-text text-sm text-gray-500 transition-all peer-placeholder-shown:top-6 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-1 peer-focus:text-sm peer-focus:text-gray-600"
                  >
                    Usuario
                  </label>
                </div>
                <div class="relative">
                  <input
                    id="contrasena"
                    name="contrasena"
                    type="password"
                    required
                    placeholder=" "
                    class="peer w-full border-0 border-b border-gray-300 bg-transparent px-0 pt-6 pb-2 text-gray-900 outline-none focus:border-gray-800 focus:ring-0"
                  />
                  <label
                    for="contrasena"
                    class="absolute top-2 left-0 cursor-text text-sm text-gray-500 transition-all peer-placeholder-shown:top-6 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-1 peer-focus:text-sm peer-focus:text-gray-600"
                  >
                    Contraseña
                  </label>
                </div>
                <div class="pt-2">
                  <button
                    type="submit"
                    class="h-12 w-44 cursor-pointer rounded-full bg-[#2b5392] font-medium text-white shadow-[0_10px_25px_rgba(120,169,215,0.35)] transition-all duration-300 hover:bg-[#1a3a6b]"
                  >
                    Ingresar
                  </button>
                </div>
                <p
                  th:if="${error}"
                  th:text="${error}"
                  class="absolute -bottom-24 left-0 w-full rounded-md border border-[#B22222] bg-[#FEE2E2] px-5 py-4 text-[#B22222]"
                ></p>
              </form>
            </div>
          </div>
        </div>
        <!-- DERECHA: IMAGEN (pantalla completa) -->
        <div class="relative hidden h-full w-full lg:block">
          <img
            th:src="@{/images/client/login.png}"
            alt="Login Cliente"
            class="absolute inset-0 h-full w-full object-cover object-center"
          />
        </div>
      </section>
    </main>
  </body>
</html>
